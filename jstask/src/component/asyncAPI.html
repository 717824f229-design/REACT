<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            async function fetchData(){
                const response=await fetch("https://jsonplaceholder.typicode.com/users");
                const data = await response.json();
                console.log("User Names:");
                data.forEach(user=>{
                    console.log(user.name);
                });
            }
            fetchData();
        </script>
    </body>
</html>
