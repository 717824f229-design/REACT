<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <script>
            let account={
                name:"",
                balance:0,
                deposit(amount){
                    this.balance=this.balance+amount;
                    return `Deposited:${amount}.New Balance:${this.balance}`;
                },
                withdraw(amount){
                    this.balance=this.balance-amount;
                    return `Withdrawn:${amount}.New Balance:${this.balance}`;
                }
            };
            account.name="Kavya";
            account.balance=40000.00;
            console.log(account.deposit(10000.50));
            console.log(account.withdraw(2500.50));
             account.name="Arun";
            account.balance=20000.00;
            console.log(account.deposit(8000.50));
            console.log(account.withdraw(1500.50));
        </script>
    </body>
</html>
