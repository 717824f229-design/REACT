<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            function fibonacci(n){
            if(n==0)
                return 0;
            else if(n==1)
                return 1;
            else{
                return fibonacci(n-1)+fibonacci(n-2);
            }
            
            }
            let n=Number(prompt("Enter a number to find fibonacci:"));
            console.log("Fibonacci of ",n," is ",fibonacci(n));
        </script>
    </body>
</html>
