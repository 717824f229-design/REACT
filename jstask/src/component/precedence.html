<!DOCTYPE html>
<html>

    <body>
        <script>
          let value=10+2*5;
          console.log("Without parantheses, '10+2*5':",value);
          let value1=(10+2)*5;
          console.log("With parantheses,'(10+2)*5':",value1);
          let value2=10*5/2;
          console.log("Without parantheses,'10*5/2':",value2);
          let value3=2*(10/5);
          console.log("With parantheses,'2*(10/5)':",value3);
          
        </script>
    </body>
    </html>
