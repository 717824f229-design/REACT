<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            function task1(){
                return new Promise(resolve=>{
                    setTimeout(()=>{
                        resolve("Task 1 Completed");
                    },1000);
                });
            }
            function task2(){
                return new Promise(resolve=>{
                    setTimeout(()=>{
                        resolve("Task 2 Completed");
                    },1000);
                });
            }
            async function runTasks(){
                const results=await Promise.all([
                    task1(),
                    task2()
                ]);
                console.log(results);
                console.log("All tasks completed");
            }
            runTasks();
        </script>
    </body>
</html>
