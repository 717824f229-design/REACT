    <body>
        <script>
            let fruit=["Apple","Banana","Orange","Water Melon"];
           fruit.push("Mango");
            console.log(fruit);
            fruit.pop();
            console.log("After removing last fruit :", fruit);
            fruit.unshift("Strawberry");
            console.log("After adding Strawberry at the front:",fruit);
        </script>
