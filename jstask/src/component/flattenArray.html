<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            function flattenArray(arr){
            let result=[];
            for(let item of arr){
                if(Array.isArray(item)){
                    result=result.concat(flattenArray(item));
                }
                else{
                    result.push(item);
                }
            }
            return result;
              }
              let nested=[1,[2,[3,4],5],6];
              console.log(flattenArray(nested));
        </script>
    </body>
</html>
