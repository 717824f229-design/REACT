<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            let person={
              increaseAge(age){
                let increase=++age;
                 return increase;
              },
              decreaseAge(age){
                let decrease=--age;
                return decrease;
              }
            
            };
            let age=Number(prompt("Enter age:"));
            if(age<=0){
                console.log("Age is zero or negative,only increase method will be performed");
                console.log(person.increaseAge(age));
            }else{
                console.log(person.increaseAge(age));
                console.log(person.decreaseAge(age));
            }
            

        </script>
    </body>
</html>
